<div class="day-header" [style.--day-color]="day.color">
  <div class="day-title-row">
    <div>
      <h2 class="day-title">{{ day.name }}: {{ day.label }}</h2>
      <div class="muscle-tags">
        <span class="muscle-tag" *ngFor="let m of day.muscleGroups">
          {{ m | titlecase }}
        </span>
      </div>
    </div>
    <div class="day-progress-circle">
      <svg viewBox="0 0 40 40" class="progress-svg">
        <g transform="rotate(-90, 20, 20)">
          <circle cx="20" cy="20" r="16" class="circle-bg"/>
          <circle cx="20" cy="20" r="16" class="circle-fill"
            [style.stroke-dashoffset]="dashoffset"
          />
        </g>
      </svg>
      <span class="progress-pct">{{ progressPercent }}%</span>
    </div>
  </div>

  <div class="day-stats">
    <span>{{ stats.completed }} / {{ stats.total }} sets done</span>
  </div>

  <div class="optional-note" *ngIf="day.schedulingNote">
    <span class="note-icon">ℹ</span>
    {{ day.schedulingNote }}
  </div>
</div>
