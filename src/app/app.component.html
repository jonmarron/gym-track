<app-rest-timer />

<div class="app">
  <header class="app-header">
    <div class="header-content">
      <h1 class="app-title">{{ planName }}</h1>
      <p class="app-subtitle">Track your sets, rest, and progress</p>
    </div>
    <button
      class="wake-lock-btn"
      [class.active]="wakeLock.enabled()"
      (click)="wakeLock.toggle()"
    >
      <span class="wake-lock-dot"></span>
      Keep Awake
    </button>
  </header>

  <app-day-tabs
    [days]="days"
    [selectedDay]="selectedDay"
    (daySelect)="onDaySelect($event)"
  />

  <main class="day-content">
    <app-day-header [day]="selectedDay" />

    <div class="exercises-list">
      <app-exercise-card
        *ngFor="let exercise of selectedDay.exercises"
        [exercise]="exercise"
        [dayId]="selectedDay.id"
        [dayColor]="selectedDay.color"
      />
    </div>

    <div class="reset-section">
      <button class="reset-btn" (click)="confirmReset()" *ngIf="!showResetConfirm">
        Reset Day
      </button>
      <div class="reset-confirm" *ngIf="showResetConfirm">
        <p>Reset all progress for {{ selectedDay.name }}?</p>
        <div class="reset-actions">
          <button class="btn-danger" (click)="resetDay()">Yes, reset</button>
          <button class="btn-cancel" (click)="cancelReset()">Cancel</button>
        </div>
      </div>
    </div>

    <app-plan-editor
      (planImported)="onPlanImported($event)"
      (planReset)="onPlanReset()"
    />
  </main>
</div>
